<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <meta name="author" content="Bruno Câmara dos Santos" />
    <meta name="description" content="A simple TODO list" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img
        src="images/alghorit_inc_logo.jpeg"
        alt="alghorit logo"
        width="40"
        height="40"
      />
    </header>
    <main>
      <h1>TODO List</h1>
      <div class="add-button">
        <button id="add">Add</button>
      </div>
      <div id="todo-container">
        <ul>
          <li>
            <p class="title">Study English</p>
            <p class="id">id:145</p>
            <p class="description">Description:</p>
            <p class="desc-info">Study English for 30 minutes everyday</p>
            <p class="finish">Finished date:</p>
            <p class="finish-info">2026-05-15 14:10:56</p>
            <input class="check" type="checkbox" id="item-b" />
            <div class="option">
              <button>Edit</button>
              <button>Remove</button>
            </div>
          </li>
        </ul>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
