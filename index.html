<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <meta name="author" content="Bruno Câmara dos Santos" />
    <meta name="description" content="A simple TODO list" />
    <link rel="stylesheet" href="src/styles/base.css" />

    <!-- SCRIPTS -->
    <script type="module" src="dist/scripts/main.js"></script>

    <script type="module" src="./dist/scripts/dialog.js"></script>
  </head>
  <body>
    <header>
      <img
        src="src/images/alghorit_inc_logo.jpeg"
        alt="alghorit logo"
        width="40"
        height="40"
      />
    </header>
    <main>
      <h1>TODO List</h1>
      <div class="add-button">
        <button id="add">Add</button>
      </div>
      <div id="todo-container"></div>
      <dialog id="dialog">
        <h2>Add new item</h2>
        <form>
          <label for="title">Title:</label>
          <input type="text" id="title" name="title" />

          <label for="description">Description:</label>
          <textarea name="description" id="description"></textarea>

          <p>Priority:</p>
          <input type="radio" name="priority" id="low" />
          <label for="low">low</label>

          <input type="radio" name="priority" id="medium" />
          <label for="medium">medium</label>

          <input type="radio" name="priority" id="high" />
          <label for="high">high</label>
          <button id="save">Save</button>
          <button id="closeDialog">Cancel</button>
        </form>
      </dialog>

      <dialog id="dialogEdit">
        <h2>Edit item</h2>
        <form>
          <label for="titleEdit">Title:</label>
          <input type="text" id="titleEdit" name="title" />

          <label for="descriptionEdit">Description:</label>
          <textarea name="description" id="descriptionEdit"></textarea>

          <p>Priority:</p>
          <input type="radio" name="priorityEdit" id="lowEdit" />
          <label for="lowEdit">low</label>

          <input type="radio" name="priorityEdit" id="mediumEdit" />
          <label for="mediumEdit">medium</label>

          <input type="radio" name="priorityEdit" id="highEdit" />
          <label for="highEdit">high</label>

          <button id="update">Edit</button>
          <button id="closeDialogEdit">Cancel</button>
        </form>
      </dialog>
    </main>
    <footer></footer>
  </body>
</html>
